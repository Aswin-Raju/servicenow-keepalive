name: Keep ServiceNow Instance Awake

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake ServiceNow instance (with retry)
        run: |
          for i in {1..10}; do
            echo "Attempt $i..."

            # Step 1: Hit homepage (this triggers wake-up)
            curl -s https://dev225142.service-now.com > /dev/null

            # Step 2: Call API with authentication
            response=$(curl -s -u ${{ secrets.SNOW_USERNAME }}:${{ secrets.SNOW_PASSWORD }} \
              "https://dev225142.service-now.com/api/now/table/sys_user?sysparm_limit=1")

            # Optional: print short response status
            echo "$response" | head -c 200
            echo ""

            # Step 3: Check if still hibernating
            if echo "$response" | grep -iq "hibernating"; then
              echo "Instance is still hibernating... waiting 60 seconds"
              sleep 60
            else
              echo "Instance is awake!"
              break
            fi
          done
